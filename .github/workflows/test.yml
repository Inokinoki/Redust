name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-and-integration-tests:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit --skipLibCheck
        env:
          TS_NODE_PROJECT_OPTIONS: '{"skipLibCheck": true}'

  redis-integration-tests:
    name: Redis Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis-stack:
        image: redis/redis-stack-server:latest
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Redis CLI
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Wait for Redis to be ready
        run: |
          for i in {1..30}; do
            if redis-cli -h localhost -p 6379 ping > /dev/null 2>&1; then
              echo "✅ Redis is ready"
              break
            fi
            echo "⏳ Waiting for Redis... ($i/30)"
            sleep 1
          done

      - name: Verify Redis connection
        run: |
          redis-cli -h localhost -p 6379 ping
          redis-cli -h localhost -p 6379 INFO server

      - name: Run Redis integration tests
        run: npm test src/test/integration/redis-live.test.ts
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test

      - name: Run AI feature integration tests
        run: npm test src/test/AIComponents.test.tsx

      - name: Run LLM integration tests
        run: npm test src/test/integration/llm.integration.test.ts

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Start preview server in background
        run: |
          mkdir -p logs
          npm run preview > logs/preview.log 2>&1 &
          PREVIEW_PID=$!
          echo "Preview server started with PID: $PREVIEW_PID"
          echo "Waiting for server to be ready..."
          # Wait for server to be ready (vite preview uses port 4173 by default)
          for i in {1..30}; do
            if curl -s http://localhost:4173 > /dev/null 2>&1; then
              echo "✅ Preview server is ready"
              break
            fi
            echo "⏳ Waiting for preview server... ($i/30)"
            sleep 2
          done
          # Verify server is running
          curl -s http://localhost:4173 || echo "Warning: Server may not be fully ready"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Stop preview server
        if: always()
        run: |
          if [ -f logs/preview.log ]; then
            echo "Preview server logs:"
            cat logs/preview.log
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-and-integration-tests, redis-integration-tests, lint, typecheck, e2e-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All test jobs completed" >> $GITHUB_STEP_SUMMARY
